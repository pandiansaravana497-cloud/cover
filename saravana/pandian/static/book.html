<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Front Cover Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a2a2a;
      font-family: 'EB Garamond', serif;
    }

    .book {
      width: 440px;
      min-height: 620px;
      position: relative;
      border-radius: 3px 10px 10px 3px;
      overflow: hidden;
      box-shadow:
        -6px 0 0 #0a0a0a,
        -10px 6px 28px rgba(0,0,0,0.85),
        0 18px 55px rgba(0,0,0,0.65);
      background: linear-gradient(160deg,
        #c8dff0 0%,
        #a8cee8 15%,
        #8fbfdf 30%,
        #b5d4ec 50%,
        #cde3f5 70%,
        #ddeefa 85%,
        #eaf5ff 100%
      );
      display: flex;
      flex-direction: column;
    }

    /* Decorative floral/swirl SVG overlay */
    .book-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Spine */
    .book::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 7px; height: 100%;
      background: linear-gradient(180deg, #3a5a8a, #1c3260);
      z-index: 10;
    }

    /* ── Main content ── */
    .content {
      position: relative;
      z-index: 2;
      padding: 36px 30px 20px 38px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .book-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 900;
      color: #111;
      line-height: 1.15;
      margin-bottom: 14px;
      text-shadow: 1px 1px 0 rgba(255,255,255,0.4);
      max-width: 260px;
    }

    .subtitle {
      font-size: 1rem;
      color: #222;
      font-style: italic;
      margin-bottom: 0;
      max-width: 280px;
      line-height: 1.5;
    }

    /* Author photo — bottom right */
    .author-photo-wrap {
      position: absolute;
      bottom: 90px;
      right: 28px;
      z-index: 5;
    }

    .author-photo {
      width: 110px;
      height: 130px;
      object-fit: cover;
      object-position: top center;
      border: 3px solid rgba(255,255,255,0.7);
      border-radius: 3px;
      box-shadow: 2px 4px 14px rgba(0,0,0,0.35);
      display: block;
    }

    /* ── Footer bar ── */
    .footer-bar {
      position: relative;
      z-index: 3;
      background: linear-gradient(90deg, #1c3260 0%, #2a4a8a 100%);
      padding: 13px 28px 13px 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 2px solid rgba(255,255,255,0.15);
    }

    .author-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .year-code {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      text-decoration: underline;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div class="book">

    <!-- Decorative SVG background (flowers / swirls like the reference) -->
    <svg class="book-bg" viewBox="0 0 440 620" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <!-- soft cloud blobs -->
      <ellipse cx="320" cy="80"  rx="100" ry="55" fill="rgba(255,255,255,0.45)"/>

      <ellipse cx="350" cy="400" rx="90"  ry="50" fill="rgba(255,255,255,0.25)"/>
      <ellipse cx="100" cy="480" rx="70"  ry="40" fill="rgba(255,255,255,0.22)"/>

        <circle cx="-13" cy="-4" r="7" fill="white"/>
        <circle cx="0"  cy="0"  r="5" fill="#8fbfdf"/>
      </g>
      <!-- Small flower bottom left -->
      <g opacity="0.40" transform="translate(60,490)">
        <circle cx="0"  cy="-12" r="6" fill="white"/>
        <circle cx="11" cy="-3"  r="6" fill="white"/>
        <circle cx="7"  cy="9"   r="6" fill="white"/>
        <circle cx="-7" cy="9"   r="6" fill="white"/>
        <circle cx="-11" cy="-3" r="6" fill="white"/>
        <circle cx="0"  cy="0"  r="4" fill="#b5d4ec"/>
      </g>
      <!-- Swirl lines -->
      <path d="M360 60 Q390 90 370 120 Q350 150 380 170" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none"/>
      <path d="M390 200 Q420 230 400 260" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" fill="none"/>
      <path d="M30 400 Q60 430 40 460 Q20 490 50 510" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" fill="none"/>
    </svg>

      <h1 class="book-title">THE PATH TO WISDOM</h1>
      <p class="subtitle">"Navigating Life's Challenges with Insight and Clarity"</p>
